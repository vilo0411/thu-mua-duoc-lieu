<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-PNKJQHNP');</script>
    <!-- End Google Tag Manager -->

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!--
      Font Google: preconnect để bắt tay sớm; tải bảng font bất đồng bộ (media=print
      → onload='all') để KHÔNG chặn render trang đã pre-render. display=swap nên chữ
      hiện ngay bằng font hệ thống rồi hoán đổi. Đã bỏ weight 300 (không dùng) và
      Playfair italic để giảm số file font tải.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Playfair+Display:wght@600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Playfair+Display:wght@600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Playfair+Display:wght@600;700&display=swap"
      />
    </noscript>

    <title>Thư Viện Dược Liệu — Kiến thức & Thu mua dược liệu Việt Nam</title>

    <!--
      KHÔNG đặt <meta description>, <link canonical> hay OG tĩnh ở đây: mỗi trang
      tự bơm thẻ SEO riêng qua <Seo> (React 19). Để tĩnh sẽ bị trùng thẻ (canonical /
      description defined multiple times). Chỉ giữ <title> làm fallback lúc tải — React
      dedupe title nên không nhân đôi.
    -->
    <!--
      Giải mã đường dẫn do public/404.html mã hoá (spa-github-pages) để khôi phục
      URL sâu cho react-router trước khi ứng dụng mount. Chạy đồng bộ trong <head>.
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PNKJQHNP"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
