<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Thư Viện Dược Liệu — Kiến thức & Thu mua dược liệu Việt Nam</title>

    <!--
      KHÔNG đặt <meta description>, <link canonical> hay OG tĩnh ở đây: mỗi trang
      tự bơm thẻ SEO riêng qua <Seo> (React 19). Để tĩnh sẽ bị trùng thẻ (canonical /
      description defined multiple times). Chỉ giữ <title> làm fallback lúc tải — React
      dedupe title nên không nhân đôi.
    -->
    <!--
      Giải mã đường dẫn do public/404.html mã hoá (spa-github-pages) để khôi phục
      URL sâu cho react-router trước khi ứng dụng mount. Chạy đồng bộ trong <head>.
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
